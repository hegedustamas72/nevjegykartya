<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Névjegy</title>
<style>
body{margin:0;color:#fff;font-family:Arial;text-align:center}
.bg{position:fixed;width:100%;height:100%;background-size:cover;z-index:-1}
.logo{width:120px;margin:20px}
.wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh}
.grid{width:90%;max-width:400px}
.row{display:flex;gap:10px;margin-bottom:10px}
.btn{flex:1;padding:14px;border-radius:12px;color:#fff;text-decoration:none}
.center{display:flex;justify-content:center}
</style>
</head>
<body>

<div class="bg"></div>
<div class="wrap">
<img class="logo">
<h2 id="label"></h2>
<div class="grid" id="grid"></div>
</div>

<script>
const params=new URLSearchParams(location.search);
const preview=params.get('preview')==='true';

let data=null;

async function load(){
if(preview){
data=JSON.parse(localStorage.getItem('previewData'));
}else{
const res=await fetch(`https://lvscrtgxcyabjftbsdmm.supabase.co/rest/v1/profiles?slug=eq.${params.get('slug')}`,{
headers:{apikey:'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx2c2NydGd4Y3lhYmpmdGJzZG1tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzMxNDYsImV4cCI6MjA4OTg0OTE0Nn0.Mu22i0W7qfNtG3F9vHdik4cXLlgAyQwqpArrJfROABw',Authorization:'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx2c2NydGd4Y3lhYmpmdGJzZG1tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzMxNDYsImV4cCI6MjA4OTg0OTE0Nn0.Mu22i0W7qfNtG3F9vHdik4cXLlgAyQwqpArrJfROABw'}
});
data=(await res.json())[0];
}

if(data.bg_image) document.querySelector('.bg').style.backgroundImage=`url(${data.bg_image})`;
if(data.logo) document.querySelector('.logo').src=data.logo;

const label=document.getElementById('label');
label.innerText=data.contacts_label||'Kapcsolatok';
label.style.color=data.contacts_color;
label.style.fontFamily=data.contacts_font;
label.style.fontSize=data.contacts_size+'px';

const order=['facebook','instagram','tiktok','website','vcf','email'];

const map={
facebook:['Facebook',data.facebook,data.facebook_color],
instagram:['Instagram',data.instagram,data.instagram_color],
tiktok:['TikTok',data.tiktok,data.tiktok_color],
website:['Web',data.website,data.website_color],
vcf:['Névjegy',data.vcf,data.vcf_color],
email:['Email',data.email?`mailto:${data.email}`:null,data.email_color]
};

const active=order.map(k=>({k,...Object.fromEntries([['label',map[k][0]],['url',map[k][1]],['color',map[k][2]]])}))
.filter(b=>b.url);

const grid=document.getElementById('grid');

if(active.length<=3){
active.forEach(b=>grid.appendChild(btn(b)));
}else{

const lastOdd = active.length%2===1 ? active.pop() : null;

for(let i=0;i<active.length;i+=2){
const row=document.createElement('div');
row.className='row';
row.appendChild(btn(active[i]));
if(active[i+1]) row.appendChild(btn(active[i+1]));
grid.appendChild(row);
}

if(lastOdd){
const c=document.createElement('div');
c.className='center';
c.appendChild(btn(lastOdd));
grid.appendChild(c);
}
}

function btn(b){
const a=document.createElement('a');
a.className='btn';
a.href=b.url;
a.style.background=b.color;
a.innerText=b.label;
return a;
}
}

load();
</script>
</body>
</html>
