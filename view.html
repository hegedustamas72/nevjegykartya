<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Névjegy</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
html, body {
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  font-family:Arial, sans-serif;
  color:#fff;
  overflow:hidden;
}

body {
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.background {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
  z-index:-1;
}

.wrapper {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  width:100%;
  padding:20px;
  box-sizing:border-box;
}

.logo {
  width:120px;
  margin-bottom:20px;
  filter:drop-shadow(0 0 10px #fff);
}

.title {
  font-size:22px;
  margin-bottom:20px;
  text-shadow:2px 2px 6px rgba(0,0,0,0.6);
}

.container {
  width:100%;
  max-width:420px;
}

.single-col {
  display:flex;
  flex-direction:column;
  gap:14px;
}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.bottom-center {
  grid-column:1 / -1;
  display:flex;
  justify-content:center;
}

.btn {
  padding:14px;
  border-radius:14px;
  text-decoration:none;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  font-size:16px;
  font-weight:bold;
  border:2px solid rgba(255,255,255,0.3);
  box-shadow:0 4px 15px rgba(0,0,0,0.4);
  transition:0.2s;
}

.btn i { font-size:18px; }

.btn:hover {
  transform:scale(1.06);
}
</style>
</head>

<body>

<div class="background"></div>

<div class="wrapper">
  <img class="logo" src="">
  <div class="title" id="contactsTitle">Csatlakozz hozzánk!</div>
  <div id="container" class="container"></div>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const isPreview = urlParams.get('preview') === 'true';

let data = null;

if(isPreview){
  data = JSON.parse(localStorage.getItem("previewData") || "{}");
  render();
}else{
  fetchData();
}

async function fetchData(){
  const slug = urlParams.get("slug");
  if(!slug) return;

  try{
    const res = await fetch(`https://lvscrtgxcyabjftbsdmm.supabase.co/rest/v1/profiles?slug=eq.${slug}`, {
      headers:{
        apikey:'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx2c2NydGd4Y3lhYmpmdGJzZG1tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzMxNDYsImV4cCI6MjA4OTg0OTE0Nn0.Mu22i0W7qfNtG3F9vHdik4cXLlgAyQwqpArrJfROABw',
        Authorization:'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx2c2NydGd4Y3lhYmpmdGJzZG1tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzMxNDYsImV4cCI6MjA4OTg0OTE0Nn0.Mu22i0W7qfNtG3F9vHdik4cXLlgAyQwqpArrJfROABw'
      }
    });

    const json = await res.json();
    data = json[0];
    render();
  }catch(e){
    console.error(e);
  }
}

/* BASE64 */
async function imageToBase64(url) {
  const res = await fetch(url);
  const blob = await res.blob();

  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onloadend = () => {
      resolve(reader.result.split(',')[1]);
    };
    reader.readAsDataURL(blob);
  });
}

/* VCF sor tördelés (CRLF!) */
function foldLine(line, max = 75){
  let result = "";
  while(line.length > max){
    result += line.substring(0, max) + "\r\n ";
    line = line.substring(max);
  }
  return result + line;
}

/* VCF generálás (FINAL FIX) */
async function generateVCF(d){

  let photoLine = "";

  if(d.photo){
    try{
      const base64 = await imageToBase64(d.photo);

      // 🔥 iPhone kompatibilis megoldás
      photoLine = foldLine(`PHOTO:data:image/jpeg;base64,${base64}`);

    }catch(e){
      console.error("Kép hiba", e);
    }
  }

  const lines = [
    "BEGIN:VCARD",
    "VERSION:3.0",
    `N:${d.last_name || ''};${d.first_name || ''}`,
    `FN:${(d.first_name || '')} ${(d.last_name || '')}`,
    d.company && `ORG:${d.company}`,
    d.position && `TITLE:${d.position}`,
    d.phone && `TEL:${d.phone}`,
    d.email && `EMAIL:${d.email}`,
    d.address && `ADR:;;${d.address}`,
    photoLine,
    "END:VCARD"
  ].filter(Boolean);

  return lines.join("\r\n"); // 🔥 CRLF kötelező
}

/* LETÖLTÉS */
async function downloadVCF(){
  const blob = new Blob([await generateVCF(data)], {type:'text/vcard'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = "contact.vcf";
  a.click();
}

/* UI */
function render(){

  const title = document.getElementById("contactsTitle");
  if(data.contacts_label && data.contacts_label.trim() !== ""){
    title.innerText = data.contacts_label;
  }

  if(data.bg_image){
    document.querySelector('.background').style.backgroundImage = `url(${data.bg_image})`;
  }

  if(data.logo){
    document.querySelector('.logo').src = data.logo;
  }

  const allButtons = [
    data.facebook && {label:"Facebook", icon:"fab fa-facebook-f", url:data.facebook, color:data.facebook_color},
    data.instagram && {label:"Instagram", icon:"fab fa-instagram", url:data.instagram, color:data.instagram_color},
    data.tiktok && {label:"TikTok", icon:"fab fa-tiktok", url:data.tiktok, color:data.tiktok_color},
    data.website && {label:"Web", icon:"fas fa-globe", url:data.website, color:data.website_color},
    (data.first_name || data.last_name) && {label:"Névjegy", icon:"fas fa-address-card", action:downloadVCF, color:data.vcf_color},
    data.email && {label:"Email", icon:"fas fa-envelope", url:"mailto:"+data.email, color:data.email_color}
  ].filter(Boolean);

  const container = document.getElementById("container");
  container.innerHTML = "";

  const maxLen = Math.max(6, ...allButtons.map(b => b.label.length));

  function createBtn(b){
    const a = document.createElement("a");
    a.className = "btn";
    a.style.background = b.color || "#444";
    a.style.minWidth = maxLen + "ch";

    a.innerHTML = `<i class="${b.icon}"></i> ${b.label}`;

    if(b.action){
      a.onclick = b.action;
    }else{
      a.href = b.url;
      a.target = "_blank";
    }

    return a;
  }

  if(allButtons.length <= 3){
    const wrap = document.createElement("div");
    wrap.className = "single-col";
    allButtons.forEach(b => wrap.appendChild(createBtn(b)));
    container.appendChild(wrap);
  } else {
    const grid = document.createElement("div");
    grid.className = "grid";

    const isOdd = allButtons.length % 2 === 1;

    allButtons.forEach((b, i) => {
      if(isOdd && i === allButtons.length - 1){
        const div = document.createElement("div");
        div.className = "bottom-center";
        div.appendChild(createBtn(b));
        grid.appendChild(div);
      } else {
        grid.appendChild(createBtn(b));
      }
    });

    container.appendChild(grid);
  }
}
</script>

</body>
</html>
