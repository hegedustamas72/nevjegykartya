<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Névjegy</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
body {
  margin:0;
  font-family: Arial;
  color:#fff;
  text-align:center;
  background:#000;
}

.background {
  position:fixed;
  width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
  z-index:-2;
  filter: blur(6px) brightness(0.8);
}

.top-logo {
  width:120px;
  margin-top:30px;
  filter: drop-shadow(0 0 10px rgba(0,0,0,0.8));
}

h1 {
  margin:20px;
}

.container {
  max-width:420px;
  margin:auto;
  padding:20px;
  display:grid;
  gap:14px;
  justify-content:center;
}

.btn {
  padding:14px;
  border-radius:14px;
  color:white;
  text-decoration:none;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  font-size:18px;
  white-space:nowrap;
}

.error {
  margin-top:100px;
  font-size:20px;
}
</style>
</head>

<body>

<div class="background"></div>

<div id="content">
  <div class="error">Betöltés...</div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://lvscrtgxcyabjftbsdmm.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx2c2NydGd4Y3lhYmpmdGJzZG1tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzMxNDYsImV4cCI6MjA4OTg0OTE0Nn0.Mu22i0W7qfNtG3F9vHdik4cXLlgAyQwqpArrJfROABw"
);

const content = document.getElementById("content");

const params = new URLSearchParams(window.location.search);
const slug = params.get("slug");
const isPreview = params.get("preview");

let data;

try {

  if (isPreview) {
    data = JSON.parse(localStorage.getItem("previewData"));
  } else {

    if (!slug) {
      content.innerHTML = '<div class="error">❗ Nincs azonosító</div>';
      throw new Error("no slug");
    }

    const { data: dbData, error } = await supabase
      .from("profiles")
      .select("*")
      .eq("slug", slug)
      .single();

    if (error || !dbData) {
      content.innerHTML = '<div class="error">❗ Nem található</div>';
      throw error;
    }

    data = dbData;
  }

  if (!data) {
    content.innerHTML = '<div class="error">❗ Nincs adat</div>';
    throw new Error("no data");
  }

  if (data.bg_image) {
    document.querySelector(".background").style.backgroundImage = `url(${data.bg_image})`;
  }

  content.innerHTML = `
    ${data.logo ? `<img src="${data.logo}" class="top-logo">` : ""}
    <h1>${data.name || ""}</h1>
    <div class="container" id="buttons"></div>
  `;

  const container = document.getElementById("buttons");

  function createBtn(label, icon, url, color) {
    if (!url) return;
    const a = document.createElement("a");
    a.href = url;
    a.target = "_blank";
    a.className = "btn";
    a.style.background = color || "#333";
    a.innerHTML = `<i class="${icon}"></i> ${label}`;
    container.appendChild(a);
  }

  if (data.vcf || isPreview) {
  createBtn(
    data.vcf_label ? data.vcf_label : "Névjegy",
    "fas fa-address-card",
    data.vcf || "#",
    data.vcf_color
  );
}
  createBtn("Facebook", "fab fa-facebook-f", data.facebook, data.facebook_color);
  createBtn("Instagram", "fab fa-instagram", data.instagram, data.instagram_color);
  createBtn("TikTok", "fab fa-tiktok", data.tiktok, data.tiktok_color);
  createBtn("Weboldal", "fas fa-globe", data.website, data.website_color);

  if (data.email) {
    createBtn("Email", "fas fa-envelope", "mailto:" + data.email, data.email_color);
  }

  // GRID LOGIKA
  const buttons = document.querySelectorAll(".btn");
  const count = buttons.length;

  if (count <= 3) {
    container.style.gridTemplateColumns = "1fr";
  } else {
    container.style.gridTemplateColumns = "1fr 1fr";
  }

  if (count === 5) {
    buttons[4].style.gridColumn = "span 2";
    buttons[4].style.justifySelf = "center";
  }

  // SZÉLESSÉG
  let maxLength = 6;
  buttons.forEach(btn => {
    const len = btn.innerText.length;
    if (len > maxLength) maxLength = len;
  });

  const width = maxLength * 10 + 60;
  buttons.forEach(btn => btn.style.minWidth = width + "px");

} catch (err) {
  console.error(err);
  content.innerHTML = '<div class="error">❗ Hiba történt</div>';
}
</script>

</body>
</html>
