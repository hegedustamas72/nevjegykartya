name: Supabase Keep Alive

on:
  schedule:
    - cron: "0 */12 * * *"

  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase
        run: |
          curl -L 'https://lvscrtgxcyabjftbsdmm.supabase.co/rest/v1/keepalive?select=id' \
          -H 'apikey: ${{ secrets.SUPABASE_ANON_KEY }}' \
          -H 'Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}'
