<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digitális Névjegy Admin</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
body { font-family: Arial; text-align:center; padding:20px; background:#f0f0f0; }
.card { background:#fff; padding:30px; border-radius:15px; max-width:600px; margin:auto; box-shadow:0 8px 24px rgba(0,0,0,0.25); }
input, select { width:90%; padding:10px; margin:10px 0; font-size:16px; border-radius:8px; border:1px solid #ccc; }
button { padding:12px 20px; font-size:16px; border:none; border-radius:10px; background:#42a5f5; color:white; cursor:pointer; margin-top:10px; }
button.copyBtn { background:#4caf50; }
button.logout { background:#ef5350; }
label { display:block; margin-top:12px; text-align:left; font-weight:bold; }
</style>
</head>
<body>

<div class="card">
<h2>Digitális Névjegy Admin</h2>

<!-- Alap adatok -->
<label>Felhívó név (slug):</label>
<input id="slug" placeholder="egyedi név">

<label>Facebook URL vagy felhasználónév:</label>
<input id="facebook" placeholder="pl.: cegnev">

<label>Facebook szín:</label>
<input type="color" id="facebook_color" value="#3b5998">

<label>Instagram URL vagy felhasználónév:</label>
<input id="instagram" placeholder="pl.: cegnev">

<label>Instagram szín:</label>
<input type="color" id="instagram_color" value="#E1306C">

<label>TikTok URL vagy felhasználónév:</label>
<input id="tiktok" placeholder="pl.: cegnev">

<label>TikTok szín:</label>
<input type="color" id="tiktok_color" value="#69C9D0">

<label>Weboldal:</label>
<input id="website" placeholder="pl.: cegnev">

<label>Web szín:</label>
<input type="color" id="website_color" value="#000000">

<label>Email:</label>
<input id="email" placeholder="valaki@valami.com">

<label>Email gomb színe:</label>
<input type="color" id="email_color" value="#6c63ff">

<hr>

<!-- Fájl feltöltések és neveik -->
<label>Logó fájl:</label>
<input type="text" id="logo_name" placeholder="pl.: cegnev-logo.png">
<input type="file" id="logo_file" accept="image/*">

<label>Háttérkép fájl:</label>
<input type="text" id="bg_name" placeholder="pl.: cegnev-bg.jpg">
<input type="file" id="bg_file" accept="image/*">

<label>Névjegy (.vcf) fájl:</label>
<input type="text" id="vcf_name" placeholder="pl.: cegnev.vcf">
<input type="file" id="vcf_file" accept=".vcf">

<label>Névjegy gomb színe:</label>
<input type="color" id="vcf_color" value="#ff9900">

<hr>

<!-- Kapcsolatok felirat -->
<label>Kapcsolatok felirat:</label>
<input id="contacts_label_text" placeholder="pl.: Kapcsolatok">
<label>Betűtípus:</label>
<select id="contacts_label_font">
  <option value="Arial">Arial</option>
  <option value="Verdana">Verdana</option>
  <option value="Times New Roman">Times New Roman</option>
</select>
<label>Betűméret (px):</label>
<input type="number" id="contacts_label_size" value="20">
<label>Betűszín:</label>
<input type="color" id="contacts_label_color" value="#ffffff">

<hr>

<!-- Névjegy adatok -->
<label>Vezetéknév:</label>
<input id="last_name" placeholder="pl.: Kovács">
<label>Keresztnév:</label>
<input id="first_name" placeholder="pl.: Péter">
<label>Cég:</label>
<input id="company" placeholder="pl.: Szeged Volley">
<label>Cím:</label>
<input id="address" placeholder="pl.: 6720 Szeged, Kossuth Lajos u. 1.">
<label>Telefon:</label>
<input id="phone" placeholder="pl.: +36 30 123 4567">

<hr>

<button id="genBtn">Link generálása</button>
<div id="link"></div>

<button id="logoutBtn" class="logout">Kijelentkezés</button>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient("https://lvscrtgxcyabjftbsdmm.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx2c2NydGd4Y3lhYmpmdGJzZG1tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzMxNDYsImV4cCI6MjA4OTg0OTE0Nn0.Mu22i0W7qfNtG3F9vHdik4cXLlgAyQwqpArrJfROABw");

async function uploadFile(fileInputId, folder, nameInputId, slugDefault){
  const file = document.getElementById(fileInputId).files[0];
  if(!file) return null;
  const nameInput = document.getElementById(nameInputId).value.trim();
  const filename = nameInput || slugDefault+'-'+file.name;
  const { data, error } = await supabase.storage.from('assets').upload(`${folder}/${filename}`, file, { upsert:true });
  if(error) { alert('Fájl feltöltési hiba: '+error.message); return null; }
  const { publicUrl } = supabase.storage.from('assets').getPublicUrl(`${folder}/${filename}`);
  return publicUrl;
}

function slugify(str){ return str.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9\-]/g,''); }

document.getElementById('genBtn').onclick = async ()=>{
    const slug = slugify(document.getElementById('slug').value || Date.now().toString());
    const logo_url = await uploadFile('logo_file','logos','logo_name',slug);
    const bg_url = await uploadFile('bg_file','backgrounds','bg_name',slug);
    const vcf_url = await uploadFile('vcf_file','vcf','vcf_name',slug);

    const profileData = {
        name: slug,
        slug: slug,
        logo: logo_url,
        bg_image: bg_url,
        facebook: document.getElementById('facebook').value,
        facebook_color: document.getElementById('facebook_color').value,
        instagram: document.getElementById('instagram').value,
        instagram_color: document.getElementById('instagram_color').value,
        tiktok: document.getElementById('tiktok').value,
        tiktok_color: document.getElementById('tiktok_color').value,
        website: document.getElementById('website').value,
        website_color: document.getElementById('website_color').value,
        vcf: vcf_url,
        vcf_label: 'Névjegy',
        vcf_color: document.getElementById('vcf_color').value,
        email: document.getElementById('email').value,
        email_color: document.getElementById('email_color').value,
        contacts_label: {
            text: document.getElementById('contacts_label_text').value,
            font: document.getElementById('contacts_label_font').value,
            size: document.getElementById('contacts_label_size').value+'px',
            color: document.getElementById('contacts_label_color').value
        },
        first_name: document.getElementById('first_name').value,
        last_name: document.getElementById('last_name').value,
        company: document.getElementById('company').value,
        address: document.getElementById('address').value,
        phone: document.getElementById('phone').value
    };

    const { data, error } = await supabase.from('profiles').insert([profileData]);
    if(error){ alert('Hiba: '+JSON.stringify(error)); return; }

    document.getElementById('link').innerHTML = `<p>Generált link:</p><input value="${window.location.origin}/view.html?slug=${slug}" readonly style="width:100%;"><button class="copyBtn" onclick="navigator.clipboard.writeText('${window.location.origin}/view.html?slug=${slug}')">Másolás</button>`;
};

document.getElementById('logoutBtn').onclick = async ()=>{
    await supabase.auth.signOut();
    location.reload();
};
</script>
</body>
</html>
