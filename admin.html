<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin</title>

<style>
body { font-family: Arial; text-align:center; padding:40px; background:#f0f0f0; }

.card {
  background:#fff;
  padding:30px;
  border-radius:15px;
  max-width:520px;
  margin:auto;
  box-shadow:0 8px 24px rgba(0,0,0,0.25);
}

input {
  width:90%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

input[type="color"] {
  height:40px;
  cursor:pointer;
}

label {
  display:block;
  margin-top:10px;
  font-weight:bold;
}

.row {
  display:flex;
  gap:10px;
  justify-content:center;
}

.row input[type="text"] {
  flex:1;
}

button {
  padding:12px 20px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#42a5f5;
  color:white;
  cursor:pointer;
}

.copyBtn { background:#4caf50; }
.logout { background:#ef5350; }
</style>
</head>

<body>
<div id="app">Betöltés...</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://lvscrtgxcyabjftbsdmm.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx2c2NydGd4Y3lhYmpmdGJzZG1tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzMxNDYsImV4cCI6MjA4OTg0OTE0Nn0.Mu22i0W7qfNtG3F9vHdik4cXLlgAyQwqpArrJfROABw"
);

const app = document.getElementById("app");

function slugify(text) {
  return text.toLowerCase().replace(/ /g, "-").replace(/[^\w-]+/g, "");
}

function buildLinks() {
  return {
    facebook: facebook.value ? "https://facebook.com/" + facebook.value : null,
    instagram: instagram.value ? "https://instagram.com/" + instagram.value : null,
    tiktok: tiktok.value ? "https://tiktok.com/@" + tiktok.value : null,
    website: website.value || null
  };
}

async function uploadFile(file, path) {
  await supabase.storage.from("assets").upload(path, file, { upsert:true });
  return `https://lvscrtgxcyabjftbsdmm.supabase.co/storage/v1/object/public/assets/${path}`;
}

async function init() {

  const { data } = await supabase.auth.getSession();

  if (!data.session) {
    app.innerHTML = `
      <div class="card">
        <h2>Login</h2>
        <input id="email" placeholder="Email">
        <input id="password" type="password" placeholder="Jelszó">
        <button id="loginBtn">Belépés</button>
      </div>
    `;

    loginBtn.onclick = async () => {
      await supabase.auth.signInWithPassword({
        email: email.value,
        password: password.value
      });
      location.reload();
    };
    return;
  }

  app.innerHTML = `
    <div class="card">
      <h1>Névjegy</h1>

      <input id="name" placeholder="Név">

      <div class="row">
        <input id="facebook" placeholder="Facebook username">
        <input id="facebook_color" type="color" value="#3b5998">
      </div>

      <div class="row">
        <input id="instagram" placeholder="Instagram username">
        <input id="instagram_color" type="color" value="#E1306C">
      </div>

      <div class="row">
        <input id="tiktok" placeholder="TikTok username">
        <input id="tiktok_color" type="color" value="#69C9D0">
      </div>

      <div class="row">
        <input id="website" placeholder="Weboldal">
        <input id="website_color" type="color" value="#000000">
      </div>

      <div class="row">
        <input id="emailField" placeholder="Email">
        <input id="email_color" type="color" value="#6c63ff">
      </div>

      <input id="vcf_label" placeholder="Névjegy gomb felirat">
      <input id="vcf_color" type="color" value="#ff9900">

      <label>Logó</label>
      <input id="logo" type="file">

      <label>Háttérkép</label>
      <input id="bg" type="file">

      <label>Névjegy (.vcf)</label>
      <input id="vcf" type="file">

      <button id="previewBtn">👁️ Előnézet</button>
      <button id="genBtn">Link generálása</button>

      <div id="previewContainer"></div>
      <div id="link"></div>

      <button id="logoutBtn" class="logout">Kijelentkezés</button>
    </div>
  `;

  logoutBtn.onclick = async () => {
    await supabase.auth.signOut();
    location.reload();
  };

  previewBtn.onclick = () => {
    const previewData = {
      name: name.value,
      ...buildLinks(),
      email: emailField.value,
      vcf_label: vcf_label.value,

      facebook_color: facebook_color.value,
      instagram_color: instagram_color.value,
      tiktok_color: tiktok_color.value,
      website_color: website_color.value,
      email_color: email_color.value,
      vcf_color: vcf_color.value
    };

    localStorage.setItem("previewData", JSON.stringify(previewData));

    previewContainer.innerHTML = `
      <iframe src="view.html?preview=true" style="width:100%; height:500px;"></iframe>
    `;
  };

  genBtn.onclick = async () => {

    const slug = slugify(name.value);

    let logoUrl = null;
    let bgUrl = null;
    let vcfUrl = null;

    if (logo.files[0]) logoUrl = await uploadFile(logo.files[0], `logos/${slug}.png`);
    if (bg.files[0]) bgUrl = await uploadFile(bg.files[0], `backgrounds/${slug}.jpg`);
    if (vcf.files[0]) vcfUrl = await uploadFile(vcf.files[0], `vcf/${slug}.vcf`);

    await supabase.from("profiles").insert({
      slug,
      name: name.value,
      logo: logoUrl,
      bg_image: bgUrl,
      vcf: vcfUrl,
      vcf_label: vcf_label.value,

      ...buildLinks(),

      facebook_color: facebook_color.value,
      instagram_color: instagram_color.value,
      tiktok_color: tiktok_color.value,
      website_color: website_color.value,
      email: emailField.value,
      email_color: email_color.value,
      vcf_color: vcf_color.value
    });

    const url = `https://hegedustamas72.github.io/nevjegykartya/view.html?slug=${slug}`;

    link.innerHTML = `
      <input value="${url}" style="width:100%">
      <button onclick="navigator.clipboard.writeText('${url}')" class="copyBtn">Másolás</button>
    `;
  };
}

init();
</script>
</body>
</html>
