<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>
<style>
body{font-family:Arial;padding:20px;background:#f0f0f0;}
.card{max-width:600px;margin:auto;background:#fff;padding:20px;border-radius:12px;}
input,select{width:100%;margin:6px 0;padding:10px;}
button{padding:12px;margin-top:10px;width:100%;cursor:pointer;}
</style>
</head>
<body>
<div class="card">

<input id="filename" placeholder="Hívónév">

<input id="facebook" placeholder="Facebook">
<input id="instagram" placeholder="Instagram">
<input id="tiktok" placeholder="TikTok">
<input id="website" placeholder="Web">
<input id="emailUser" placeholder="Email">

<input id="vcf_first" placeholder="Keresztnév">
<input id="vcf_last" placeholder="Vezetéknév">
<input id="vcf_company" placeholder="Cég">
<input id="vcf_phone" placeholder="Telefon">
<input id="vcf_address" placeholder="Cím">

<input type="file" id="logo_image">
<input type="file" id="bg_image">

<input id="contacts_label" placeholder="Kapcsolatok felirat">
<select id="contacts_font">
<option>Arial</option>
<option>Verdana</option>
<option>Tahoma</option>
</select>
<input type="color" id="contacts_color">
<input type="number" id="contacts_size" value="24">

<input type="color" id="facebook_color">
<input type="color" id="instagram_color">
<input type="color" id="tiktok_color">
<input type="color" id="website_color">
<input type="color" id="vcf_color">
<input type="color" id="email_color">

<button id="genBtn">Mentés</button>
<button id="previewBtn">Preview</button>

<div id="link"></div>

</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
"https://lvscrtgxcyabjftbsdmm.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx2c2NydGd4Y3lhYmpmdGJzZG1tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzMxNDYsImV4cCI6MjA4OTg0OTE0Nn0.Mu22i0W7qfNtG3F9vHdik4cXLlgAyQwqpArrJfROABw"
);

function slugify(n){return n.toLowerCase().replace(/[^a-z0-9]+/g,'-')+'-'+Date.now();}

async function readFile(file){
return new Promise(res=>{
const r=new FileReader();
r.onload=e=>res(e.target.result);
r.readAsDataURL(file);
});
}

// 🔵 MENTÉS
genBtn.onclick = async ()=>{

const slug = slugify(filename.value);

const vcf=`BEGIN:VCARD
VERSION:3.0
N:${vcf_last.value};${vcf_first.value}
FN:${vcf_first.value} ${vcf_last.value}
ORG:${vcf_company.value}
TEL:${vcf_phone.value}
EMAIL:${emailUser.value}
ADR:${vcf_address.value}
END:VCARD`;

const vcfFile = new File([vcf], slug+".vcf");

const files={logo:logo_image.files[0],bg:bg_image.files[0],vcf:vcfFile};
const bucket='assets';
const uploaded={};

for(const k in files){
if(files[k]){
const path =
k==='logo'?`logos/${slug}_${files[k].name}`:
k==='bg'?`backgrounds/${slug}_${files[k].name}`:
`vcf/${slug}_${files[k].name}`;

await supabase.storage.from(bucket).upload(path,files[k]);

const {data}=supabase.storage.from(bucket).getPublicUrl(path);
uploaded[k]=data.publicUrl;
}
}

await supabase.from('profiles').insert([{
slug,
facebook:facebook.value?`https://facebook.com/${facebook.value}`:null,
instagram:instagram.value?`https://instagram.com/${instagram.value}`:null,
tiktok:tiktok.value?`https://tiktok.com/@${tiktok.value}`:null,
website:website.value.startsWith('http')?website.value:`https://${website.value}`,
email:emailUser.value,

logo:uploaded.logo,
bg_image:uploaded.bg,
vcf:uploaded.vcf,

contacts_label:contacts_label.value,
contacts_font:contacts_font.value,
contacts_color:contacts_color.value,
contacts_size:contacts_size.value,

facebook_color:facebook_color.value,
instagram_color:instagram_color.value,
tiktok_color:tiktok_color.value,
website_color:website_color.value,
vcf_color:vcf_color.value,
email_color:email_color.value
}]);

link.innerHTML = `${location.origin}/view.html?slug=${slug}`;
};

// 🔵 PREVIEW
previewBtn.onclick = async ()=>{
const data={
facebook:`https://facebook.com/${facebook.value}`,
instagram:`https://instagram.com/${instagram.value}`,
tiktok:`https://tiktok.com/@${tiktok.value}`,
website:website.value,
email:emailUser.value,

contacts_label:contacts_label.value,
contacts_font:contacts_font.value,
contacts_color:contacts_color.value,
contacts_size:contacts_size.value,

facebook_color:facebook_color.value,
instagram_color:instagram_color.value,
tiktok_color:tiktok_color.value,
website_color:website_color.value,
vcf_color:vcf_color.value,
email_color:email_color.value
};

if(logo_image.files[0]) data.logo=await readFile(logo_image.files[0]);
if(bg_image.files[0]) data.bg_image=await readFile(bg_image.files[0]);

data.vcf="#";

localStorage.setItem('previewData',JSON.stringify(data));
window.open('view.html?preview=true');
};
</script>
</body>
</html>
