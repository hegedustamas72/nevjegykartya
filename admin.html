<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin</title>
<style>
body { font-family: Arial; text-align:center; padding:20px; background:#f0f0f0; }
.card { background:#fff; padding:30px; border-radius:15px; max-width:520px; margin:auto; box-shadow:0 8px 24px rgba(0,0,0,0.25); }
input { width:90%; padding:10px; margin:6px 0; border-radius:8px; border:1px solid #ccc; }
input[type="color"] { height:40px; cursor:pointer; }
label { display:block; margin-top:10px; font-weight:bold; }
.row { display:flex; gap:10px; }
.row input[type="text"] { flex:1; }
button { padding:12px 20px; margin-top:10px; border:none; border-radius:10px; background:#42a5f5; color:white; cursor:pointer; }
.copyBtn { background:#4caf50; }
.logout { background:#ef5350; }
</style>
</head>
<body>
<div id="app">Betöltés...</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://lvscrtgxcyabjftbsdmm.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx2c2NydGd4Y3lhYmpmdGJzZG1tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzMxNDYsImV4cCI6MjA4OTg0OTE0Nn0.Mu22i0W7qfNtG3F9vHdik4cXLlgAyQwqpArrJfROABw"
);

const app = document.getElementById("app");

// biztonságos slug
function slugify(text) {
  if (!text) return "";
  return text.toLowerCase().replace(/ /g, "-").replace(/[^\w-]+/g, "");
}

// minden input összegyűjtése
function getFormData() {
  return {
    name: document.getElementById("name")?.value || "",
    facebook: document.getElementById("facebook")?.value || "",
    instagram: document.getElementById("instagram")?.value || "",
    tiktok: document.getElementById("tiktok")?.value || "",
    website: document.getElementById("website")?.value || "",
    email: document.getElementById("emailField")?.value || "",
    vcf_label: document.getElementById("vcf_label")?.value || "Névjegy",
    facebook_color: document.getElementById("facebook_color")?.value,
    instagram_color: document.getElementById("instagram_color")?.value,
    tiktok_color: document.getElementById("tiktok_color")?.value,
    website_color: document.getElementById("website_color")?.value,
    email_color: document.getElementById("email_color")?.value,
    vcf_color: document.getElementById("vcf_color")?.value
  };
}

// username → link
function buildLinks(data) {
  return {
    facebook: data.facebook ? `https://facebook.com/${data.facebook}` : null,
    instagram: data.instagram ? `https://instagram.com/${data.instagram}` : null,
    tiktok: data.tiktok ? `https://tiktok.com/@${data.tiktok}` : null,
    website: data.website || null
  };
}

// file feltöltés Storage-ba
async function uploadFile(file, path) {
  if (!file) return null;
  const { error } = await supabase.storage.from("assets").upload(path, file, { upsert: true });
  if (error) {
    console.error(error);
    alert("Feltöltési hiba!");
    return null;
  }
  return `https://lvscrtgxcyabjftbsdmm.supabase.co/storage/v1/object/public/assets/${path}`;
}

async function init() {
  const { data } = await supabase.auth.getSession();
  if (!data.session) {
    app.innerHTML = `
      <div class="card">
        <h2>Login</h2>
        <input id="email" placeholder="Email">
        <input id="password" type="password" placeholder="Jelszó">
        <button id="loginBtn">Belépés</button>
      </div>
    `;
    document.getElementById("loginBtn").onclick = async () => {
      const { error } = await supabase.auth.signInWithPassword({
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
      });
      if (error) alert(error.message);
      else location.reload();
    };
    return;
  }

  // admin UI
  app.innerHTML = `
    <div class="card">
      <h1>Névjegy generátor</h1>
      <input id="name" placeholder="Név">
      <div class="row"><input id="facebook" placeholder="Facebook username"><input id="facebook_color" type="color" value="#3b5998"></div>
      <div class="row"><input id="instagram" placeholder="Instagram username"><input id="instagram_color" type="color" value="#E1306C"></div>
      <div class="row"><input id="tiktok" placeholder="TikTok username"><input id="tiktok_color" type="color" value="#69C9D0"></div>
      <div class="row"><input id="website" placeholder="Weboldal"><input id="website_color" type="color" value="#000000"></div>
      <div class="row"><input id="emailField" placeholder="Email"><input id="email_color" type="color" value="#6c63ff"></div>
      <input id="vcf_label" placeholder="Névjegy gomb felirat"><input id="vcf_color" type="color" value="#ff9900">
      <label>Logó</label><input id="logo" type="file">
      <label>Háttérkép</label><input id="bg" type="file">
      <label>Névjegy (.vcf)</label><input id="vcf" type="file">
      <button id="previewBtn">👁️ Előnézet</button>
      <button id="genBtn">Link generálása</button>
      <div id="previewContainer"></div>
      <div id="link"></div>
      <button id="logoutBtn" class="logout">Kijelentkezés</button>
    </div>
  `;

  document.getElementById("logoutBtn").onclick = async () => { await supabase.auth.signOut(); location.reload(); };

  // 👁️ Preview
  document.getElementById("previewBtn").onclick = () => {
    const data = getFormData();
    const links = buildLinks(data);

    // blob URL-ek preview-hoz
    const logoFile = document.getElementById("logo").files[0];
    const bgFile = document.getElementById("bg").files[0];
    const vcfFile = document.getElementById("vcf").files[0];

    const previewData = { ...data, ...links };
    if (logoFile) previewData.logo = URL.createObjectURL(logoFile);
    if (bgFile) previewData.bg_image = URL.createObjectURL(bgFile);
    if (vcfFile) previewData.vcf = URL.createObjectURL(vcfFile);

    localStorage.setItem("previewData", JSON.stringify(previewData));
    document.getElementById("previewContainer").innerHTML = `<iframe src="view.html?preview=true" style="width:100%; height:500px; border:none;"></iframe>`;
  };

  // 🚀 Generálás
  document.getElementById("genBtn").onclick = async () => {
    const data = getFormData();
    if (!data.name) { alert("A név kötelező!"); return; }
    const slug = slugify(data.name) + "-" + Date.now();
    const links = buildLinks(data);

    const logoFile = document.getElementById("logo").files[0];
    const bgFile = document.getElementById("bg").files[0];
    const vcfFile = document.getElementById("vcf").files[0];

    const logoUrl = await uploadFile(logoFile, `logos/${slug}.png`);
    const bgUrl = await uploadFile(bgFile, `backgrounds/${slug}.jpg`);
    const vcfUrl = await uploadFile(vcfFile, `vcf/${slug}.vcf`);

    const { error } = await supabase.from("profiles").insert({
      slug, name: data.name,
      logo: logoUrl, bg_image: bgUrl, vcf: vcfUrl, vcf_label: data.vcf_label,
      ...links,
      facebook_color: data.facebook_color, instagram_color: data.instagram_color,
      tiktok_color: data.tiktok_color, website_color: data.website_color,
      email: data.email, email_color: data.email_color, vcf_color: data.vcf_color
    });

    if (error) { console.error(error); alert("Mentési hiba!"); return; }

    const url = `https://hegedustamas72.github.io/nevjegykartya/view.html?slug=${slug}`;
    document.getElementById("link").innerHTML = `<input value="${url}" style="width:100%"><button onclick="navigator.clipboard.writeText('${url}')" class="copyBtn">Másolás</button>`;
  };
}

init();
</script>
</body>
</html>
