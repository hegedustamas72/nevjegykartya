<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Digitális Névjegy</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
body { font-family: Arial, sans-serif; padding:20px; background:#f0f0f0; }
.card { background:#fff; padding:25px; border-radius:15px; max-width:480px; margin:auto; box-shadow:0 8px 24px rgba(0,0,0,0.25); }
.card h2 { margin-top:0; }
input, select, button { width:100%; margin:8px 0; padding:10px; font-size:16px; border-radius:6px; border:1px solid #ccc; box-sizing:border-box; }
button { cursor:pointer; background:#42a5f5; color:#fff; border:none; }
.color-picker { height:35px; padding:0; }
#previewBtn { background:#ff9800; margin-top:15px; }
#link { margin-top:10px; word-break: break-all; }
</style>
</head>
<body>
<div class="card">
  <h2>Admin Panel</h2>

  <input id="fileName" placeholder="Fájlnév / hívónév">
  <input id="fullName" placeholder="Vezetéknév Keresztnév">
  <input id="company" placeholder="Cég">
  <input id="phone" placeholder="Telefon">
  <input id="email" placeholder="Email">
  <input id="address" placeholder="Cím">

  <input type="file" id="logoFile" accept="image/*">
  <input type="file" id="bgFile" accept="image/*">

  <h4>Gombok</h4>
  <input id="facebook" placeholder="Facebook felhasználónév">
  <input type="color" id="facebook_color" class="color-picker" value="#3b5998">

  <input id="instagram" placeholder="Instagram felhasználónév">
  <input type="color" id="instagram_color" class="color-picker" value="#E1306C">

  <input id="tiktok" placeholder="TikTok felhasználónév">
  <input type="color" id="tiktok_color" class="color-picker" value="#69C9D0">

  <input id="website" placeholder="Weboldal / felhasználónév">
  <input type="color" id="website_color" class="color-picker" value="#000000">

  <input id="contacts_label" placeholder="Kapcsolatok felirat">
  <input type="color" id="contacts_color" class="color-picker" value="#ffffff">
  <input type="number" id="contacts_size" placeholder="Betűméret (px)" value="20">

  <button id="previewBtn">Preview</button>
  <div id="link"></div>
</div>

<script>
function readFileAsDataURL(file){
    return new Promise((res, rej)=>{
        const reader=new FileReader();
        reader.onload=e=>res(e.target.result);
        reader.onerror=rej;
        reader.readAsDataURL(file);
    });
}

document.getElementById('previewBtn').onclick = async ()=>{
    const data = {
        fileName: document.getElementById('fileName').value,
        fullName: document.getElementById('fullName').value,
        company: document.getElementById('company').value,
        phone: document.getElementById('phone').value,
        email: document.getElementById('email').value,
        address: document.getElementById('address').value,
        facebook: document.getElementById('facebook').value ? 'https://facebook.com/'+document.getElementById('facebook').value : '',
        facebook_color: document.getElementById('facebook_color').value,
        instagram: document.getElementById('instagram').value ? 'https://instagram.com/'+document.getElementById('instagram').value : '',
        instagram_color: document.getElementById('instagram_color').value,
        tiktok: document.getElementById('tiktok').value ? 'https://tiktok.com/@'+document.getElementById('tiktok').value : '',
        tiktok_color: document.getElementById('tiktok_color').value,
        website: document.getElementById('website').value ? 'https://'+document.getElementById('website').value : '',
        website_color: document.getElementById('website_color').value,
        contacts_label: document.getElementById('contacts_label').value,
        contacts_color: document.getElementById('contacts_color').value,
        contacts_size: document.getElementById('contacts_size').value
    };

    // Logo / háttér képek
    const logoFile=document.getElementById('logoFile').files[0];
    if(logoFile) data.logo = await readFileAsDataURL(logoFile);
    const bgFile=document.getElementById('bgFile').files[0];
    if(bgFile) data.bg_image = await readFileAsDataURL(bgFile);

    // VCF generálás
    const vcf = `BEGIN:VCARD
VERSION:3.0
N:${data.fullName || ''};
FN:${data.fullName || ''}
ORG:${data.company || ''}
TEL;TYPE=WORK,VOICE:${data.phone || ''}
EMAIL;TYPE=PREF,INTERNET:${data.email || ''}
ADR;TYPE=WORK:${data.address || ''}
END:VCARD`;
    data.vcf = "data:text/vcard;charset=utf-8,"+encodeURIComponent(vcf);

    localStorage.setItem('previewData', JSON.stringify(data));
    window.open('view.html?preview=true','_blank');
}
</script>
</body>
</html>
