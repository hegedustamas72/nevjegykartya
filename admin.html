<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Digitális Névjegy</title>
<style>
body { font-family: Arial; padding:20px; background:#f0f0f0; }
.card { background:#fff; padding:30px; border-radius:15px; max-width:600px; margin:auto; box-shadow:0 8px 24px rgba(0,0,0,0.25); }
input, select { width:80%; padding:10px; margin:8px 0; border-radius:8px; border:1px solid #ccc; font-size:16px; }
label { display:block; margin-top:12px; font-weight:bold; }
button { padding:12px 20px; margin-top:12px; border:none; border-radius:10px; cursor:pointer; font-size:16px; }
.upload-label { display:block; margin-top:10px; font-weight:bold; }
.color-picker { width:40px; height:30px; border:none; cursor:pointer; }
</style>
</head>
<body>
<div class="card">
<h2>Digitális Névjegy Admin</h2>

<label>Vezetéknév</label><input type="text" id="lastname">
<label>Keresztnév</label><input type="text" id="firstname">
<label>Cég</label><input type="text" id="company">
<label>Cím</label><input type="text" id="address">
<label>Telefon</label><input type="text" id="phone">
<label>Email</label><input type="email" id="email">

<label class="upload-label">Logó</label><input type="file" id="logoFile" accept="image/*">
<label class="upload-label">Háttérkép</label><input type="file" id="bgFile" accept="image/*">

<h3>Gombok és színek</h3>
<label>Facebook szín</label><input type="color" id="facebookColor" class="color-picker" value="#3b5998">
<label>Instagram szín</label><input type="color" id="instagramColor" class="color-picker" value="#E1306C">
<label>TikTok szín</label><input type="color" id="tiktokColor" class="color-picker" value="#69C9D0">
<label>Weboldal szín</label><input type="color" id="websiteColor" class="color-picker" value="#000000">
<label>Névjegy szín</label><input type="color" id="vcfColor" class="color-picker" value="#ff9900">
<label>Email szín</label><input type="color" id="emailColor" class="color-picker" value="#6c63ff">

<label>Kapcsolatok felirat</label>
<input type="text" id="contactsText" placeholder="Kapcsolatok">
<label>Betűtípus</label>
<input type="text" id="contactsFont" placeholder="Arial">
<label>Betűméret</label>
<input type="text" id="contactsSize" placeholder="20px">
<label>Betűszín</label>
<input type="color" id="contactsColor" value="#ffffff">

<button id="generateBtn">Link generálása</button>
<button id="previewBtn">Preview</button>
<div id="linkOutput" style="margin-top:15px;"></div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";
const supabase = createClient("https://lvscrtgxcyabjftbsdmm.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx2c2NydGd4Y3lhYmpmdGJzZG1tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzMxNDYsImV4cCI6MjA4OTg0OTE0Nn0.Mu22i0W7qfNtG3F9vHdik4cXLlgAyQwqpArrJfROABw");

async function uploadFile(file, folder){
    if(!file) return null;
    const filename = Date.now() + '-' + file.name;
    const { data, error } = await supabase.storage.from(folder).upload(filename, file, {upsert:true});
    if(error) { alert("Feltöltési hiba: "+error.message); return null; }
    return supabase.storage.from(folder).getPublicUrl(filename).publicUrl;
}

function generateVcf({firstname, lastname, company, address, phone, email}){
    return `BEGIN:VCARD
VERSION:3.0
N:${lastname};${firstname};;;
FN:${firstname} ${lastname}
ORG:${company}
TEL;TYPE=WORK,VOICE:${phone}
EMAIL:${email}
ADR;TYPE=WORK:;;${address};;;;
END:VCARD`;
}

document.getElementById("generateBtn").onclick = async ()=>{
    const data = {
        firstname: document.getElementById("firstname").value,
        lastname: document.getElementById("lastname").value,
        company: document.getElementById("company").value,
        address: document.getElementById("address").value,
        phone: document.getElementById("phone").value,
        email: document.getElementById("email").value,
        facebook_color: document.getElementById("facebookColor").value,
        instagram_color: document.getElementById("instagramColor").value,
        tiktok_color: document.getElementById("tiktokColor").value,
        website_color: document.getElementById("websiteColor").value,
        vcf_color: document.getElementById("vcfColor").value,
        email_color: document.getElementById("emailColor").value,
        contacts_label: {
            text: document.getElementById("contactsText").value,
            font: document.getElementById("contactsFont").value,
            size: document.getElementById("contactsSize").value,
            color: document.getElementById("contactsColor").value
        }
    };

    // Fájlok feltöltése
    data.logo = await uploadFile(document.getElementById("logoFile").files[0],"logos");
    data.bg_image = await uploadFile(document.getElementById("bgFile").files[0],"backgrounds");

    // VCF generálás
    data.vcf = generateVcf(data);

    // Supabase-be mentés
    const slug = 'profile-'+Date.now();
    const { error } = await supabase.from('profiles').insert([{...data, slug}]);
    if(error) { alert("Hiba az adatbázisba mentéskor: "+error.message); return; }

    document.getElementById("linkOutput").innerHTML=`<a href="view.html?preview=true" target="_blank">Megtekintés</a>`;
    
    // Preview adatok localStorage-ba
    localStorage.setItem("previewData", JSON.stringify(data));
};

// Preview gomb
document.getElementById("previewBtn").onclick = ()=>{
    window.open("view.html?preview=true","_blank");
};
</script>
</body>
</html>
